# Fleet config for the openFPGA-MiSTer fork org.
# One [<Core>] section per fork. The propagator (.github/setup_cicd.sh) renders
# each fork's copy.bara.sky + upstream.yml from cores/<Core>/ and this config.
#
# Only cores that vendor the MiSTer RTL *verbatim* (Family A) can be auto-synced.
# SMS / GBA / GBC are restructured LLM ports with no 1:1 mapping and are NOT listed.

[Forks]
SYNCING_FORKS = NES SNES

[NES]
FORK_REPO            = https://github.com/openFPGA-MiSTer/openfpga-NES.git
UPSTREAM_MISTER_REPO = https://github.com/MiSTer-devel/NES_MiSTer.git
MAIN_BRANCH          = master
UPSTREAM_BRANCH      = master
# MiSTer NES sources are already LF and land 1:1 under rtl/upstream/.
VENDOR_PATH          = rtl/upstream
NORMALIZE_CRLF       = no
# cores/NES/copy.bara.sky is agg23's proven config (move rtl -> rtl/upstream,
# 4 patches, exclude nes_mister.qip).

[SNES]
FORK_REPO            = https://github.com/openFPGA-MiSTer/openfpga-SNES.git
UPSTREAM_MISTER_REPO = https://github.com/MiSTer-devel/SNES_MiSTer.git
MAIN_BRANCH          = master
UPSTREAM_BRANCH      = master
# MiSTer SNES sources are CRLF; the fork keeps rtl/ as LF at the rtl/ root.
VENDOR_PATH          = rtl
NORMALIZE_CRLF       = yes
# cores/SNES/copy.bara.sky vendors rtl/**, strips CR, reapplies 7 patches, and
# excludes fork-owned files (sdram/ioport/lightgun/mister_top/**/dropped MiSTer files).
